<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastidor Criativo</title>
  <meta name="description" content="Bastidores do meu home studio que me fazem faturar 30k+ mês com design de produto e IA">
  <meta property="og:title" content="Bastidor Criativo — Douglas Helmer">
  <meta property="og:description" content="Bastidores do meu home studio que me fazem faturar 30k+ mês com design de produto e IA">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --bg-soft:     #111113;
      --accent:      #C9A84C;
      --accent-glow: #C9A84C33;
      --ink:         #f0ede8;
      --ink-dim:     #8a8480;
      --wpp:         #25D366;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ── grain texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
    }

    /* ── layout ── */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100dvh;
    }

    /* ── photo side ── */
    .photo-side {
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .photo-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right,  transparent 55%, var(--bg) 100%),
        linear-gradient(to top,    var(--bg) 0%,    transparent 25%);
      pointer-events: none;
    }

    /* placeholder shown when foto.jpg is missing */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: linear-gradient(160deg, #1c1c20 0%, #0d0d0f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      color: var(--ink-dim);
    }
    .photo-placeholder svg { opacity: .3; }
    .photo-placeholder span {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── text side ── */
    .text-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 4rem 4rem 3rem;
      gap: 1.75rem;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: .625rem;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 1.75rem;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.55rem, 2.8vw, 2.35rem);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -.02em;
      text-wrap: balance;
      color: var(--ink);
    }

    h1 .highlight {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.0625rem;
      line-height: 1.65;
      color: var(--ink-dim);
      max-width: 34ch;
    }

    /* ── WhatsApp button ── */
    @keyframes wpp-pulse {
      0%   { box-shadow: 0 0 0 0   #25D36666; }
      70%  { box-shadow: 0 0 0 14px #25D36600; }
      100% { box-shadow: 0 0 0 0   #25D36600; }
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      background: var(--wpp);
      color: #fff;
      font-family: inherit;
      font-size: 1.125rem;
      font-weight: 700;
      padding: 1.125rem 2.25rem;
      border-radius: .625rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      align-self: flex-start;
      transition: transform .15s ease, filter .15s ease;
      animation: wpp-pulse 1.8s ease-out infinite;
    }

    .cta:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      animation-play-state: paused;
    }

    .cta:focus-visible {
      outline: 2px solid var(--wpp);
      outline-offset: 3px;
    }

    .cta svg {
      width: 1.375rem;
      height: 1.375rem;
      flex-shrink: 0;
    }

    /* ── footer sig ── */
    .sig {
      font-size: .75rem;
      color: var(--ink-dim);
      opacity: .5;
    }

    /* ── mobile ── */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: 56vw 1fr;
      }

      .photo-side {
        height: 56vw;
        max-height: 340px;
      }

      .photo-side::after {
        background: linear-gradient(to bottom, transparent 45%, var(--bg) 100%);
      }

      .photo-placeholder { min-height: 56vw; }

      .text-side {
        padding: 2rem 1.5rem 3.5rem;
        gap: 1.5rem;
      }

      .cta {
        align-self: stretch;
        justify-content: center;
        font-size: 1.0625rem;
        padding: 1rem 1.75rem;
      }
    }

    @media (min-width: 1280px) {
      .text-side { padding: 5rem 5rem 5rem 3.5rem; }
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- ── FOTO ── substitua foto.jpg pela foto real -->
    <div class="photo-side" role="img" aria-label="Douglas Helmer no home studio">
      <img
        src="foto.jpg"
        alt="Douglas Helmer no home studio"
        onerror="
          this.outerHTML=`
          <div class='photo-placeholder'>
            <svg width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' aria-hidden='true'>
              <rect x='3' y='3' width='18' height='18' rx='2'/>
              <circle cx='8.5' cy='8.5' r='1.5'/>
              <path d='m21 15-5-5L5 21'/>
            </svg>
            <span>foto.jpg</span>
          </div>`
        "
      >
    </div>

    <!-- ── TEXTO ── -->
    <div class="text-side">

      <p class="eyebrow" aria-label="Bastidor Criativo">Bastidor Criativo</p>

      <h1>
        Bastidores do meu home studio que me fazem faturar
        <span class="highlight">30k+ mês</span>
        com design de produto e IA
      </h1>

      <p class="subtitle">
        Entre no grupo para receber insightz e os links das lives semanais.
      </p>

      <!-- substitua WHATSAPP_URL pelo link real do grupo -->
      <a
        href="https://chat.whatsapp.com/KdzkUp870GKBJowViMV2ID"
        class="cta"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Entrar no grupo do WhatsApp — Bastidor Criativo"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Entrar no grupo
      </a>

      <p class="sig" aria-hidden="true">Douglas Helmer · bastidorcriativo.com</p>

    </div>
  </main>
</body>
</html>
